# Netlify configuration for The ACT Almanac
[build]
  publish = "."
  functions = "netlify/functions"

# Pretty path: front-end posts to /api/tutor → routed to the function
[[redirects]]
  from = "/api/tutor"
  to = "/.netlify/functions/tutor"
  status = 200

[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200
